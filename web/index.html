<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3/3 Academic System — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75; --green-dark: #0F6E56; --green-light: #e6f7f1; --green-mid: #c3ead8;
      --red: #c0392b; --red-light: #fdecea;
      --purple: #7c3aed; --purple-light: #ede9fe; --purple-mid: #c4b5fd;
      --bg: #f4f6f4; --card: #ffffff; --border: #e8ebe8;
      --text: #1a1a1a; --muted: #6b7b6b; --label: #9aaa9a;
    }
    body {
      font-family: 'Prompt', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-wrap {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .brand { text-align: center; }
    .brand-icon {
      width: 96px; height: 96px;
      background-image: url('TASLogo.png');
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      margin: 0 auto 14px;
    }
    .brand h1 { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
    .brand p { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 300; }
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .card-title { font-size: 15px; font-weight: 500; color: var(--text); text-align: center; }
    .card-sub { font-size: 12px; color: var(--muted); text-align: center; font-weight: 300; margin-top: -0.75rem; }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 13px 20px;
      background: white;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-family: 'Prompt', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    .btn-google:hover { background: #f8fafc; border-color: #cbd5e1; }
    .btn-google:active { transform: scale(0.99); }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .status {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 12px;
      text-align: center;
      font-weight: 400;
      display: none;
      line-height: 1.5;
    }
    .s-error { background: var(--red-light); color: var(--red); display: block; }
    .s-success { background: var(--green-light); color: var(--green-dark); display: block; }
    .s-loading { background: #f8fafc; color: var(--muted); display: block; }
    .user-card {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .user-card.visible { display: flex; }
    .user-avatar {
      width: 56px; height: 56px;
      border-radius: 50%;
      border: 2px solid var(--green-light);
      object-fit: cover;
    }
    .user-avatar-fallback {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--green);
      color: white;
      font-size: 20px;
      font-weight: 500;
      display: flex; align-items: center; justify-content: center;
    }
    .user-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .user-email { font-size: 12px; color: var(--muted); font-weight: 300; }
    .role-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--green-light);
      color: var(--green-dark);
    }
    .role-badge.denied { background: var(--red-light); color: var(--red); }
    .role-badge.checking { background: #f8fafc; color: var(--muted); }

    .btn-calendar {
      width: 100%;
      padding: 13px;
      background: white;
      border: 1.5px solid var(--green);
      border-radius: 12px;
      font-family: 'Prompt', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--green);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      touch-action: manipulation;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-calendar:hover { background: var(--green-light); }
    .btn-calendar:active { transform: scale(0.99); }

    .btn-announce {
      width: 100%;
      padding: 13px;
      background: var(--purple-light);
      border: 1.5px solid var(--purple-mid);
      border-radius: 12px;
      font-family: 'Prompt', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--purple);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      touch-action: manipulation;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-announce:hover { background: var(--purple-mid); border-color: var(--purple); }
    .btn-announce:active { transform: scale(0.99); }

    .btn-continue {
      width: 100%;
      padding: 13px;
      background: var(--green);
      border: none;
      border-radius: 12px;
      font-family: 'Prompt', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: white;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      touch-action: manipulation;
    }
    .btn-continue:hover { background: var(--green-dark); }
    .btn-continue:active { transform: scale(0.99); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      color: var(--label);
    }
    .divider::before,.divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-signout {
      width: 100%;
      padding: 11px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Prompt', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s;
      touch-action: manipulation;
    }
    .btn-signout:hover { background: var(--red-light); color: var(--red); border-color: #f5c6c6; }

    .hint {
      font-size: 11px;
      color: var(--label);
      text-align: center;
      line-height: 1.6;
    }
    #loginPanel { display: flex; flex-direction: column; gap: 1rem; }
    #userPanel { display: none; flex-direction: column; gap: 0.875rem; }
    @media (max-width: 400px) { .card { padding: 1.5rem 1.25rem; } }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon"></div>
    <h1>3/3 Academic System</h1>
    <p>Sign in to continue</p>
  </div>

  <div class="card">
    <!-- Login panel -->
    <div id="loginPanel">
      <div class="card-title">Sign in with Google</div>
      <div class="card-sub">Use your school Google account</div>
      <div class="status" id="status"></div>
      <button class="btn-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <div class="hint">Sign in with any Google account to view the calendar.<br>Mod panel access is restricted to authorised accounts.</div>
    </div>

    <!-- User panel (shown when signed in) -->
    <div id="userPanel">
      <div class="user-card" id="userCard">
        <div id="avatarWrap"></div>
        <div>
          <div class="user-name" id="userName"></div>
          <div class="user-email" id="userEmail"></div>
        </div>
        <div class="role-badge checking" id="roleBadge">⏳ Checking access...</div>
      </div>

      <div class="status" id="statusUser"></div>

      <!-- Calendar -->
      <a class="btn-calendar" id="calendarBtn" href="calendar.html">📅 Go to Calendar</a>

      <!-- Announcements -->
      <a class="btn-announce" href="announce.html" target="_blank" rel="noopener">📢 Announcements</a>

      <div class="divider">account</div>

      <!-- Mod panel — only for whitelisted accounts -->
      <button class="btn-continue" id="continueBtn" style="display:none">🛠 Go to Mod Panel</button>

      <button class="btn-signout" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <div class="hint" style="margin-top:-0.5rem;">3/3 Academic System &nbsp;·&nbsp; v2</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js"
import { getAuth, signInWithPopup, signOut, onAuthStateChanged, GoogleAuthProvider }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js"
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js"

const firebaseConfig = {
  apiKey: "AIzaSyA7jTnrA4qvIyqJRec3LYRgkIpJ4lKqX18",
  authDomain: "tas-samtabsam.firebaseapp.com",
  projectId: "tas-samtabsam",
  storageBucket: "tas-samtabsam.firebasestorage.app",
  messagingSenderId: "645483732924",
  appId: "1:645483732924:web:5a1ec2b9f7c58a18c655b9"
}

const MOD_PANEL_URL = "announce.html"

const app      = initializeApp(firebaseConfig)
const auth     = getAuth(app)
const db       = getFirestore(app)
const provider = new GoogleAuthProvider()
provider.setCustomParameters({ prompt: "select_account" })

// ── Fetch whitelist from Firestore ────────────────────────────
// Document: config/modWhitelist  →  { emails: ["a@b.com", ...] }
async function fetchWhitelist() {
  try {
    const snap = await getDoc(doc(db, "config", "modWhitelist"))
    if (!snap.exists()) return []
    return (snap.data().emails || []).map(e => e.toLowerCase())
  } catch(e) {
    console.warn("Could not fetch whitelist:", e)
    return []
  }
}

function setStatus(id, cls, text) {
  const el = document.getElementById(id)
  el.className = "status " + cls
  el.textContent = text
}
function clearStatus(id) {
  const el = document.getElementById(id)
  el.className = "status"
  el.textContent = ""
}

async function showUserPanel(user) {
  document.getElementById("loginPanel").style.display = "none"
  document.getElementById("userPanel").style.display = "flex"
  document.getElementById("userCard").classList.add("visible")

  const avatarWrap = document.getElementById("avatarWrap")
  if (user.photoURL) {
    avatarWrap.innerHTML = `<img class="user-avatar" src="${user.photoURL}" alt="${user.displayName}" />`
  } else {
    const initials = (user.displayName || user.email).split(" ").map(w => w[0]).join("").toUpperCase().slice(0,2)
    avatarWrap.innerHTML = `<div class="user-avatar-fallback">${initials}</div>`
  }

  document.getElementById("userName").textContent = user.displayName || "—"
  document.getElementById("userEmail").textContent = user.email

  const badge       = document.getElementById("roleBadge")
  const continueBtn = document.getElementById("continueBtn")

  // Check whitelist from Firestore
  const whitelist = await fetchWhitelist()
  const isMod = whitelist.includes(user.email.toLowerCase())

  if (isMod) {
    badge.textContent         = "✅ Moderator"
    badge.className           = "role-badge"
    continueBtn.style.display = "block"
    continueBtn.onclick       = () => { window.location.href = MOD_PANEL_URL }
  } else {
    badge.textContent         = "👤 Student"
    badge.className           = "role-badge"
    continueBtn.style.display = "none"
  }
  clearStatus("statusUser")
}

function showLoginPanel() {
  document.getElementById("loginPanel").style.display = "flex"
  document.getElementById("userPanel").style.display  = "none"
  document.getElementById("userCard").classList.remove("visible")
  clearStatus("status")
}

onAuthStateChanged(auth, user => {
  if (user) showUserPanel(user)
  else showLoginPanel()
})

document.getElementById("googleBtn").onclick = async () => {
  const btn = document.getElementById("googleBtn")
  btn.disabled = true
  setStatus("status", "s-loading", "⏳ Opening Google sign-in...")
  try {
    await signInWithPopup(auth, provider)
  } catch(e) {
    if (e.code === "auth/popup-closed-by-user") clearStatus("status")
    else setStatus("status", "s-error", "Sign-in failed: " + e.message)
    btn.disabled = false
  }
}

document.getElementById("signOutBtn").onclick = async () => { await signOut(auth) }
</script>
</body>
</html>
